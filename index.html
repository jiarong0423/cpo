:root{

  --text:#e2e8f0; --muted:#64748b; --dim:#334155;

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Noto Sans TC',sans-serif;color:var(--text)}

#bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.1}
#mv{position:fixed;inset:0;z-index:1;cursor:grab;touch-action:none;overflow:visible}
#mv:active{cursor:grabbing}

/* leaf / spoke transitions */
.lu{
  transition:opacity .32s ease, transform .32s cubic-bezier(.4,0,.2,1);
  transform-box:fill-box;
}
.lu.closed{opacity:0;pointer-events:none;transform:translateX(-30px) scale(.88)}
.lu.open  {opacity:1;pointer-events:all;transform:translateX(0) scale(1)}

.sp{transition:opacity .28s ease}
.sp.closed{opacity:0}
.sp.open  {opacity:1}

/* branch hover */
.bn{cursor:pointer}
.bn:hover .bn-rect{filter:brightness(1.2)}

/* side panel */
#panel{
  position:fixed;top:0;right:0;width:310px;height:100%;
  background:var(--panel-bg);border-left:.5px solid var(--b1);
  z-index:50;transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
#panel.on{transform:translateX(0)}
#ph{padding:18px 18px 14px;border-bottom:.5px solid var(--b1);
    display:flex;align-items:flex-start;justify-content:space-between}
#pt{font-size:14px;font-weight:700;flex:1;line-height:1.4;margin-right:10px}
#pc{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0;line-height:1}
#pc:hover{color:var(--text)}
#pb{padding:14px 18px;overflow-y:auto;flex:1}
.p-tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:4px;
       font-weight:700;margin-bottom:10px;letter-spacing:.04em}
.p-sub{font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.6}
.p-row{display:flex;gap:9px;padding:9px 0;border-bottom:.5px solid rgba(30,58,95,.5);
       align-items:flex-start;font-size:11.5px}
.p-row:last-child{border-bottom:none}
.p-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.p-txt{color:#94a3b8;line-height:1.65}
.p-txt b{color:var(--text);font-weight:500}

/* ui */
.ui{position:fixed;z-index:40;font-family:'Noto Sans TC',sans-serif}
#leg{top:14px;left:14px;background:rgba(2,13,28,.95);border:.5px solid var(--b1);
     border-radius:10px;padding:11px 15px}
#leg h3{font-family:'Space Mono',monospace;font-size:9px;color:var(--pu-t);
        margin-bottom:7px;letter-spacing:.08em}
.li{display:flex;align-items:center;gap:6px;font-size:10px;color:#94a3b8;margin-bottom:3px}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}

#hdr{top:14px;right:14px;text-align:right}
#hdr h1{font-size:12px;font-weight:700;color:var(--pu-t)}
#hdr p{font-size:9px;color:#1e3a5f;margin-top:2px}

#btns{bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.btn{background:rgba(2,13,28,.9);border:.5px solid var(--b1);border-radius:7px;
     padding:7px 13px;font-size:10.5px;color:var(--muted);cursor:pointer;
     font-family:'Noto Sans TC',sans-serif;transition:all .2s}
.btn:hover{border-color:var(--us);color:var(--us-t)}
.btn.a{background:linear-gradient(135deg,#1d4ed8,#6d28d9);color:#fff;border-color:transparent}
.btn.a:hover{opacity:.85}

/* reset btn */
#resetbtn{bottom:14px;left:14px;background:rgba(2,13,28,.9);border:.5px solid var(--b1);
          border-radius:7px;padding:7px 13px;font-size:10.5px;color:var(--muted);cursor:pointer;
          font-family:'Noto Sans TC',sans-serif}
#resetbtn:hover{border-color:var(--pu);color:var(--pu-t)}
</style>

       {k:"AAOI",v:"佔AAOI 44%營收，最大單一客戶"},
       {k:"規模",v:"1.6T收發器計劃200萬支，市場規模$30億+"}]}},
    {n:"Google",             s:"TPU / OCS光路",    t:"us",
     d:{sub:"NASDAQ，AI光通訊先知，7年前即布局",items:[
       {k:"先見",v:"7年前告訴業界AI叢集光通訊多於算力本身"},
       {k:"TPU OCS",v:"光路交換系統，Lumentum供CW雷射+ELSFP光源"},
       {k:"穩懋",v:"穩懋供PD接收端，佔Lumentum Google TPU訂單兩成"}]}},
    {n:"智邦  2345",         s:"網通交換機",        t:"tw",
     d:{sub:"台股上市，網通交換機設備龍頭，CPO下游整合商",items:[
       {k:"業務",v:"網路交換機設備製造，資料中心核心設備"},
       {k:"CPO",v:"CPO技術成熟後，交換機整合光引擎，直接受惠"},
       {k:"地位",v:"第一階核心王者，外資長期加碼"}]}}
  ]},
];

// ═══════════════════════════════════════════════════════════════
// STYLES
// ═══════════════════════════════════════════════════════════════
const ST = {
  us:    {fill:"#06182e",stroke:"#3b82f6",text:"#93c5fd",tag:"美股",   tagBg:"#1e3a8a"},
  tw:    {fill:"#041408",stroke:"#22c55e",text:"#86efac",tag:"台股",   tagBg:"#14532d"},
  nvidia:{fill:"#180800",stroke:"#f97316",text:"#fdba74",tag:"🔴 Nvidia",tagBg:"#7c2d12"},
};

// ═══════════════════════════════════════════════════════════════
// LAYOUT  — left-to-right tree, no overlaps
// ═══════════════════════════════════════════════════════════════
const ROW_H    = 58;   // vertical space per leaf
const BR_GAP   = 14;   // extra gap between branch groups
const LF_W     = 156;  // leaf box width
const LF_H     = 44;   // leaf box height
const BR_W     = 148;  // branch box width
const BR_H     = 44;   // branch box height
const ROOT_W   = 130;
const ROOT_H   = 90;

const X_ROOT   = 140;   // root center x
const X_BRANCH = 390;   // branch center x
const X_LEAF   = 670;   // leaf center x

// Compute branch & leaf y positions
let yc = 70;
DATA.forEach(br => {
  const span = br.leaves.length * ROW_H;
  br.by = yc + span / 2;                         // branch center y
  br.leaves.forEach((lf, i) => {
    lf.ly = yc + ROW_H * i + ROW_H / 2;           // leaf center y
  });
  yc += span + BR_GAP;
  br.open = false;
});
const CANVAS_H = yc + 60;
const ROOT_Y   = CANVAS_H / 2;
const CANVAS_W = 920;

// ═══════════════════════════════════════════════════════════════
// SVG SETUP
// ═══════════════════════════════════════════════════════════════
const NS  = "http://www.w3.org/2000/svg";
const svg = document.getElementById("mv");
const W   = window.innerWidth, H = window.innerHeight;
svg.setAttribute("width", W);
svg.setAttribute("height", H);

function mk(tag, a={}) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(a)) e.setAttribute(k, v);
  return e;
}
function tx(s, a={}) { const e = mk("text",a); e.textContent = s; return e; }

// ── DEFS ──────────────────────────────────────────────────────
const defs = document.getElementById("df");

// Glow filters
[["us","7"],["tw","7"],["nvidia","9"],["br","5"],["root","16"],["warn","6"]].forEach(([id,sd]) => {
  const f = mk("filter",{id:`gf-${id}`,x:"-80%",y:"-80%",width:"260%",height:"260%"});
  const gb = mk("feGaussianBlur",{stdDeviation:sd,result:"b"});
  const m = mk("feMerge");
  m.appendChild(mk("feMergeNode",{in:"b"}));
  m.appendChild(mk("feMergeNode",{in:"SourceGraphic"}));
  f.appendChild(gb); f.appendChild(m); defs.appendChild(f);
});

// Root gradient
const rg = mk("radialGradient",{id:"rgr",cx:"50%",cy:"50%",r:"50%"});
[["0%","#3b0764"],["100%","#0a0824"]].forEach(([o,c]) => {
  const s = mk("stop",{offset:o}); s.setAttribute("stop-color",c); rg.appendChild(s);
});
defs.appendChild(rg);

const wrap = document.getElementById("wrap");
const GL = mk("g"); wrap.appendChild(GL);  // lines
const GN = mk("g"); wrap.appendChild(GN);  // nodes

// ═══════════════════════════════════════════════════════════════
// DRAW ROOT
// ═══════════════════════════════════════════════════════════════
function curve(x1,y1,x2,y2,color,w,op){
  const mx = (x1+x2)/2;
  const p = mk("path",{
    d:`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`,
    fill:"none", stroke:color, "stroke-width":w, opacity:op
  });
  return p;
}

// Root node
{
  const g = mk("g");
  g.appendChild(mk("circle",{cx:X_ROOT,cy:ROOT_Y,r:66,fill:"none",
    stroke:"#7c3aed","stroke-width":".5","stroke-dasharray":"5 4",opacity:".35"}));
  g.appendChild(mk("circle",{cx:X_ROOT,cy:ROOT_Y,r:60,fill:"url(#rgr)",
    stroke:"#7c3aed","stroke-width":"1.6",filter:"url(#gf-root)"}));

  ["光通訊產業","AI供應鏈","2026"].forEach((t,i) => {
    g.appendChild(tx(t,{x:X_ROOT,y:ROOT_Y+(i-1)*21+4,
      "text-anchor":"middle","dominant-baseline":"central",
      "font-size":i===2?"12":"15","font-weight":"700",
      "font-family":"Noto Sans TC,sans-serif",
      fill: i===2 ? "#c4b5fd" : "#f8fafc"}));
  });
  GN.appendChild(g);
}

// Nvidia banner
{
  const bw=230, bh=28, bx=X_LEAF+LF_W/2+20, by=50;
  GN.appendChild(mk("rect",{x:bx,y:by,width:bw,height:bh,rx:7,
    fill:"#180800",stroke:"#f97316","stroke-width":"1",filter:"url(#gf-nvidia)"}));
  GN.appendChild(tx("⚡ Nvidia 豪擲 $40億 卡位光通訊供應鏈",{
    x:bx+bw/2,y:by+bh/2+1,"text-anchor":"middle","dominant-baseline":"central",
    "font-size":"11","font-family":"Noto Sans TC,sans-serif",
    fill:"#fdba74","font-weight":"600"}));
}

// InP warning
{
  const bw=210, bh=27, bx=X_LEAF+LF_W/2+20, by=CANVAS_H-65;
  GN.appendChild(mk("rect",{x:bx,y:by,width:bw,height:bh,rx:7,
    fill:"#120a00",stroke:"#fbbf24","stroke-width":"1","stroke-dasharray":"4 3"}));
  GN.appendChild(tx("⚠ EML/InP缺貨  交期排至2027後",{
    x:bx+bw/2,y:by+bh/2+1,"text-anchor":"middle","dominant-baseline":"central",
    "font-size":"10.5","font-family":"Noto Sans TC,sans-serif",fill:"#fbbf24"}));
}

// ═══════════════════════════════════════════════════════════════
// DRAW BRANCHES & LEAVES
// ═══════════════════════════════════════════════════════════════
DATA.forEach((br, bi) => {
  const {by, color} = br;

  // Root → branch curve
  GL.appendChild(curve(X_ROOT, ROOT_Y, X_BRANCH - BR_W/2, by, color, 1.6, .45));

  // Branch node
  const bg = mk("g",{cursor:"pointer"});
  bg.id = `bn-${bi}`;
  bg.classList.add("bn");

  bg.appendChild(mk("rect",{
    x: X_BRANCH - BR_W/2, y: by - BR_H/2,
    width: BR_W, height: BR_H, rx: 10,
    fill:"#040c1a", stroke:color, "stroke-width":"1.4",
    filter:"url(#gf-br)", class:"bn-rect"
  }));

  // Count badge
  bg.appendChild(mk("rect",{
    x:X_BRANCH+BR_W/2-24,y:by-BR_H/2-1,
    width:20,height:16,rx:4,fill:color,opacity:".9"}));
  bg.appendChild(tx(`${br.leaves.length}`,{
    x:X_BRANCH+BR_W/2-14,y:by-BR_H/2+7,
    "text-anchor":"middle","dominant-baseline":"central",
    "font-size":"9","font-weight":"700",
    "font-family":"Noto Sans TC,sans-serif",fill:"#020d1c"}));

  // Chevron
  const chev = tx("▸",{
    x:X_BRANCH-BR_W/2+10,y:by,
    "dominant-baseline":"central","font-size":"11",
    "font-family":"monospace",fill:color,opacity:".8"});
  chev.id = `cv-${bi}`;
  bg.appendChild(chev);

  // Label (split on two spaces)
  const parts = br.label.split("  ");
  parts.forEach((t,i) => {
    bg.appendChild(tx(t,{
      x: X_BRANCH, y: by + (i-(parts.length-1)/2)*15+1,
      "text-anchor":"middle","dominant-baseline":"central",
      "font-size":"11","font-weight":"600",
      "font-family":"Noto Sans TC,sans-serif",fill:color}));
  });

  bg.addEventListener("click", () => toggleBranch(bi));
  GN.appendChild(bg);

  // ── Leaves ─────────────────────────────────────────────────
  br.leaves.forEach((lf, li) => {
    const {ly} = lf;
    const st = ST[lf.t] || ST.us;

    // Spoke
    const sp = mk("line",{
      x1: X_BRANCH+BR_W/2, y1: by,
      x2: X_LEAF-LF_W/2,   y2: ly,
      stroke:color,"stroke-width":"1.1"});
    sp.classList.add("sp","closed");
    sp.id = `sp-${bi}-${li}`;
    GL.appendChild(sp);

    // Leaf group
    const lg = mk("g",{cursor:"pointer"});
    lg.classList.add("lu","closed");
    lg.id = `lf-${bi}-${li}`;
    // transform-origin = branch center so it animates from there
    lg.style.transformOrigin = `${X_BRANCH}px ${by}px`;

    // Box
    lg.appendChild(mk("rect",{
      x: X_LEAF-LF_W/2, y: ly-LF_H/2,
      width:LF_W, height:LF_H, rx:9,
      fill:st.fill, stroke:st.stroke, "stroke-width":"1.1",
      filter:`url(#gf-${lf.t})`}));

    // Connector dot
    lg.appendChild(mk("circle",{
      cx:X_LEAF-LF_W/2-2,cy:ly,r:4.5,
      fill:st.stroke,filter:`url(#gf-${lf.t})`}));

    // Name
    lg.appendChild(tx(lf.n.replace("  "," "),{
      x:X_LEAF-LF_W/2+10, y:ly-7,
      "dominant-baseline":"central","text-anchor":"start",
      "font-size":"11","font-weight":"700",
      "font-family":"Noto Sans TC,sans-serif",fill:st.text}));

    // Sub
    lg.appendChild(tx(lf.s,{
      x:X_LEAF-LF_W/2+10, y:ly+9,
      "dominant-baseline":"central","text-anchor":"start",
      "font-size":"9","font-family":"Noto Sans TC,sans-serif",
      fill:"#475569"}));

    lg.addEventListener("click", e => { e.stopPropagation(); openPanel(lf,st); });
    lg.addEventListener("mouseenter", () =>
      lg.querySelector("rect").setAttribute("stroke-width","2.2"));
    lg.addEventListener("mouseleave", () =>
      lg.querySelector("rect").setAttribute("stroke-width","1.1"));
    GN.appendChild(lg);
  });
});

// ═══════════════════════════════════════════════════════════════
// TOGGLE
// ═══════════════════════════════════════════════════════════════
function toggleBranch(bi) {
  const br = DATA[bi];
  br.open = !br.open;
  document.getElementById(`cv-${bi}`).textContent = br.open ? "▾" : "▸";
  br.leaves.forEach((_,li) => {
    const lfEl = document.getElementById(`lf-${bi}-${li}`);
    const spEl = document.getElementById(`sp-${bi}-${li}`);
    const cls  = br.open ? ["open","closed"] : ["closed","open"];
    lfEl.classList.add(cls[0]); lfEl.classList.remove(cls[1]);
    spEl.classList.add(cls[0]); spEl.classList.remove(cls[1]);
  });
}
function expandAll()   { DATA.forEach((_,i) => { if(!DATA[i].open) toggleBranch(i); }); }
function collapseAll() { DATA.forEach((_,i) => { if(DATA[i].open)  toggleBranch(i); }); }

// ═══════════════════════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════════════════════
const panel = document.getElementById("panel");
function openPanel(lf, st) {
  document.getElementById("pt").innerHTML =
    `<span style="color:${st.text}">${lf.n.replace("  "," ")}</span>
     <span style="display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;
       background:${st.tagBg};color:#fff;margin-left:6px;font-weight:700;vertical-align:middle">
       ${st.tag}</span>`;
  document.getElementById("pb").innerHTML =
    `<div class="p-tag" style="background:${st.tagBg};color:#fff">${st.tag}</div>
     <div class="p-sub">${lf.d.sub}</div>
     ${lf.d.items.map(r =>
       `<div class="p-row">
         <div class="p-dot" style="background:${st.stroke}"></div>
         <div class="p-txt"><b>${r.k}</b>　${r.v}</div>
       </div>`).join("")}`;
  panel.classList.add("on");
}
function closePanel() { panel.classList.remove("on"); }
svg.addEventListener("click", () => { if (panel.classList.contains("on")) closePanel(); });

// ═══════════════════════════════════════════════════════════════
// PAN / ZOOM
// ═══════════════════════════════════════════════════════════════
let sc = Math.min(W/CANVAS_W, H/CANVAS_H) * .9;
let tx_ = (W - CANVAS_W*sc) / 2;
let ty_ = (H - CANVAS_H*sc) / 2;
let drag = false, lmx = 0, lmy = 0;

function applyT() {
  wrap.setAttribute("transform", `translate(${tx_},${ty_}) scale(${sc})`);
}
applyT();

function resetView() {
  sc  = Math.min(W/CANVAS_W, H/CANVAS_H) * .9;
  tx_ = (W - CANVAS_W*sc) / 2;
  ty_ = (H - CANVAS_H*sc) / 2;
  applyT();
}

svg.addEventListener("wheel", ev => {
  if (panel.classList.contains("on") && ev.clientX > W-320) return;
  ev.preventDefault();
  const f = ev.deltaY < 0 ? 1.11 : .91;
  tx_ = ev.clientX - (ev.clientX - tx_)*f;
  ty_ = ev.clientY - (ev.clientY - ty_)*f;
  sc  = Math.max(.08, Math.min(6, sc*f));
  applyT();
}, {passive:false});

svg.addEventListener("mousedown", ev => {
  if (ev.target.closest("[cursor='pointer']")) return;
  drag=true; lmx=ev.clientX; lmy=ev.clientY;
});
window.addEventListener("mousemove", ev => {
  if (!drag) return;
  tx_+=ev.clientX-lmx; ty_+=ev.clientY-lmy;
  lmx=ev.clientX; lmy=ev.clientY; applyT();
});
window.addEventListener("mouseup", () => drag=false);

// Touch
let lastD=0;
svg.addEventListener("touchstart", ev => {
  if (ev.touches.length===1){drag=true;lmx=ev.touches[0].clientX;lmy=ev.touches[0].clientY;}
  if (ev.touches.length===2) lastD=Math.hypot(
    ev.touches[0].clientX-ev.touches[1].clientX,
    ev.touches[0].clientY-ev.touches[1].clientY);
},{passive:true});
svg.addEventListener("touchmove", ev => {
  ev.preventDefault();
  if (ev.touches.length===1&&drag){
    tx_+=ev.touches[0].clientX-lmx; ty_+=ev.touches[0].clientY-lmy;
    lmx=ev.touches[0].clientX; lmy=ev.touches[0].clientY; applyT();
  }
  if (ev.touches.length===2){
    const d=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,
                       ev.touches[0].clientY-ev.touches[1].clientY);
    const f=d/lastD;
    const mx=(ev.touches[0].clientX+ev.touches[1].clientX)/2;
    const my=(ev.touches[0].clientY+ev.touches[1].clientY)/2;
    tx_=mx-(mx-tx_)*f; ty_=my-(my-ty_)*f;
    sc=Math.max(.08,Math.min(6,sc*f)); lastD=d; applyT();
  }
},{passive:false});
window.addEventListener("touchend", () => drag=false);

// ═══════════════════════════════════════════════════════════════
// BACKGROUND ANIMATION
// ═══════════════════════════════════════════════════════════════
const bgc = document.getElementById("bg");
bgc.width = W; bgc.height = H;
const ctx = bgc.getContext("2d");
const fibers = Array.from({length:14}, () => ({
  x:Math.random()*W, y:Math.random()*H,
  vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
  len:80+Math.random()*140,
  hue:[200,140,270,30,180][Math.floor(Math.random()*5)],
  a:.08+Math.random()*.2
}));
(function anim(){
  ctx.clearRect(0,0,W,H);
  fibers.forEach(f => {
    f.x+=f.vx; f.y+=f.vy;
    if(f.x<0||f.x>W)f.vx*=-1;
    if(f.y<0||f.y>H)f.vy*=-1;
    const ang=Math.atan2(f.vy,f.vx);
    const ex=f.x+f.len*Math.cos(ang), ey=f.y+f.len*Math.sin(ang);
    const g2=ctx.createLinearGradient(f.x,f.y,ex,ey);
    g2.addColorStop(0,`hsla(${f.hue},70%,55%,0)`);
    g2.addColorStop(.5,`hsla(${f.hue},70%,55%,${f.a})`);
    g2.addColorStop(1,`hsla(${f.hue},70%,55%,0)`);
    ctx.beginPath(); ctx.moveTo(f.x,f.y); ctx.lineTo(ex,ey);
    ctx.strokeStyle=g2; ctx.lineWidth=1.2; ctx.stroke();
  });
  requestAnimationFrame(anim);
})();

// ═══════════════════════════════════════════════════════════════
// DOWNLOAD
// ═══════════════════════════════════════════════════════════════
function dlSVG() {
  expandAll();
  setTimeout(() => {
    const clone = svg.cloneNode(true);
    clone.setAttribute("xmlns", NS);
    const st = document.createElementNS(NS,"style");
    st.textContent = `.lu,.sp{opacity:1;transform:none}text{font-family:sans-serif}`;
    clone.insertBefore(st, clone.firstChild);
    const blob = new Blob([clone.outerHTML],{type:"image/svg+xml"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "光通訊AI供應鏈心智圖2026.svg";
    a.click();
  }, 450);
}
</script>
